name: Build Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockShuffler-VST3-Windows
          path: build/BlockShuffler_artefacts/VST3/

      - name: Upload Standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockShuffler-Standalone-Windows
          path: build/BlockShuffler_artefacts/Standalone/
